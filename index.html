<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

  <div class="calculator">
    <div id="name">Ntoto's Calculator</div>
    
    <input class="display" type="text" readonly>
     
    <div class="buttons">

      <button class="part">Clear</button>
      <button class="part">Del</button>
      <button class="part">%</button>
      <button class="part">÷</button>
      <button class="part">7</button>
      <button class="part">8</button>
      <button class="part">9</button>
      <button class="part">×</button>
      <button class="part">4</button>
      <button class="part">5</button>
      <button class="part">6</button>
      <button class="part">-</button>
      <button class="part">1</button>
      <button class="part">2</button>
      <button class="part">3</button>
      <button class="part">+</button>
      <button class="part" id="zero">0</button>
      <button class="part">.</button>
      <button class="part">=</button>

    </div>

  </div>
</body>
</html>
