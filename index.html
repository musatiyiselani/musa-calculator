<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

  <div class="calculator">
    <div id="name">Ntoto's Calculator</div>
    
    <input id="display" type="text" readonly>



    <div id="buttons3">

      <button class="part1" id="shift-Btn">shift</button>
      <button class="part1" id="alpha-Btn">alpha</button>


      <div id="control">

        <div id="control1">
          <button class="part1"><</button>
        </div>
        
        <div id="control2">
          <button class="part1">/\</button>
          <button class="part1">\/</button>
        </div>
        
        <div id="control3">
          <button class="part1">></button>
        </div>
        
      </div>
      

      <button class="part1" id="mode-Btn">mode</button>
      <button class="part1" id="on-Btn">on</button>
      
    </div>

    <div id="buttons2">


      <button class="part1"></button>
      <button class="part1"></button>
      <button class="part1"></button>
      <button class="part1"></button>
      <button class="part1"></button>
      <button class="part1"></button>

      <button class="part1">ᵃ⁄♭</button>
      <button class="part1"></button>
      <button class="part1"></button>
      <button class="part1">log</button>
      <button class="part1">ln</button>
      <button class="part1"></button>


      <button class="part1">√⬚</button>
      <button class="part1">
        x<sup>⬚</sup>
      </button>
      <button class="trig">sin</button>
      <button class="trig">cos</button>
      <button class="trig">tan</button>
      <button class="part1"></button>
      



      <button class="part1">π</button>
      <button class="part1">%</button>
      <button onclick="openBracket('(')" class="part" id="bracket">(</button>
      <button onclick="appendToDisplay(')')" class="part" id="bracket">)</button>
      <button class="part1">
        x<sup>2</sup>
      </button>
      <button class="part1">S⇔D</button>

    </div>
     
    <div class="buttons1">


      <!-- π -->

      
      <button onclick="appendToDisplay('7')" class="part">7</button>
      <button onclick="appendToDisplay('8')" class="part">8</button>
      <button onclick="appendToDisplay('9')" class="part">9</button>
      <button onclick="deleteBtn()" class="part" id="Del-Btn">Del</button>
      <button onclick="clearDisplay()" class="part" id="AC-Btn">AC</button>
      <button onclick="appendToDisplay('4')" class="part">4</button>
      <button onclick="appendToDisplay('5')" class="part">5</button>
      <button onclick="appendToDisplay('6')" class="part">6</button>
      <button onclick="appendToDisplay('×')" class="part">×</button>
      <button onclick="appendToDisplay('÷')" class="part">÷</button>
      <button onclick="appendToDisplay('1')" class="part">1</button>
      <button onclick="appendToDisplay('2')" class="part">2</button>
      <button onclick="appendToDisplay('3')" class="part">3</button>
      <button onclick="appendToDisplay('+')" class="part">+</button>
      <button onclick="appendToDisplay('-')" class="part">-</button>
      <button onclick="appendToDisplay('0')" class="part" id="zero">0</button>
      <button onclick="appendToDisplay('.')" class="part">.</button>
      <button class="part1" id="Ans-Btn">Ans</button>
      <button onclick="calculate()" class="part">=</button>

    </div>

  </div>

  <script src="index.js"></script>

</body>
</html>
